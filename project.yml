name: WarmKitty
options:
  bundleIdPrefix: com.barrybarrywu
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  WarmKitty:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/web
        type: folder
      - path: Assets.xcassets
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barrybarrywu.warmkitty
        PRODUCT_NAME: Warm Kitty
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

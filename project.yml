name: WarmKitty
options:
  bundleIdPrefix: com.barrybarrywu
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

targets:
  WarmKitty:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Resources/Localizable.xcstrings
      - path: Resources/Audio
        type: folder
      - path: Resources/Fonts
        type: folder
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.barrybarrywu.warmkitty
        PRODUCT_NAME: Warm Kitty
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  WarmKittyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WarmKittyTests
    dependencies:
      - target: WarmKitty
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Warm Kitty.app/Contents/MacOS/Warm Kitty"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  WarmKitty:
    build:
      targets:
        WarmKitty: all
        WarmKittyTests: [test]
    test:
      targets:
        - WarmKittyTests

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warm Kitty</title>
<link href="vendor/fonts.css" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Baloo 2', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
    background: #D8C9B3;
    -webkit-font-smoothing: antialiased;
    -webkit-user-select: none; user-select: none;
  }
  img { -webkit-user-drag: none; user-drag: none; }

  @keyframes wk-fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  @keyframes wk-narr { from { transform: translateY(7px); } to { transform: translateY(0); } }
  @keyframes wk-rise { from { opacity: 0; transform: translateY(16px) scale(0.96); } to { opacity: 1; transform: none; } }

  /* gentle cat sway + breathe while warming */
  @keyframes wk-sway {
    0%   { transform: translateY(0) rotate(-0.6deg) scale(1); }
    50%  { transform: translateY(-3px) rotate(0.6deg) scale(1.018); }
    100% { transform: translateY(0) rotate(-0.6deg) scale(1); }
  }
  .cat-sway { animation: wk-sway 4.2s ease-in-out infinite; transform-origin: 50% 78%; }

  @keyframes wk-heat { 0%,100% { opacity: .35; } 50% { opacity: .9; } }
  @keyframes wk-ping { 0% { transform: scale(0.94); opacity: 0; } 22% { opacity: 0.9; } 100% { transform: scale(1.16); opacity: 0; } }
  .wk-ding { animation: wk-ping 0.8s cubic-bezier(.2,.7,.3,1) both; transform-origin: 50% 50%; }
  @keyframes wk-pop { 0% { transform: scale(0.9); } 45% { transform: scale(1.06); } 100% { transform: scale(1); } }
  .wk-pop { animation: wk-pop 0.6s cubic-bezier(.34,1.5,.5,1); }

  /* duration slider (standby) */
  .wk-dur-label { font-family: 'PingFang SC', system-ui; font-size: 13px; font-weight: 600; color: #8A6446; margin-bottom: 13px; text-align: center; }
  .wk-range {
    -webkit-appearance: none; appearance: none; width: 100%; height: 10px; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--p), rgba(110,74,51,0.16) var(--p), rgba(110,74,51,0.16) 100%);
    outline: none; cursor: pointer; margin: 0; display: block;
  }
  .wk-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%;
    background: #fff; border: 3px solid var(--accent); box-shadow: 0 2px 6px rgba(110,74,51,0.3); cursor: grab;
  }
  .wk-range::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.08); }
  .wk-range::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: #fff; border: 3px solid var(--accent);
    box-shadow: 0 2px 6px rgba(110,74,51,0.3); cursor: grab;
  }
  .wk-scale { display: flex; justify-content: space-between; margin-top: 9px; font-family: 'PingFang SC', system-ui; font-size: 11px; color: #B08A60; }

  /* countdown track (warming) — heater rides the bar */
  .wk-track { position: relative; height: 10px; border-radius: 999px; background: rgba(110,74,51,0.16); }
  .wk-track-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 999px; }
  .wk-slot { position: relative; touch-action: none; user-select: none; -webkit-user-select: none; }
  .wk-slot.draggable { cursor: grab; }
  .wk-slot.draggable:active { cursor: grabbing; }
  .wk-heater { position: absolute; bottom: -3px; transform: translateX(-50%); pointer-events: none; will-change: transform; backface-visibility: hidden; }
  .wk-slot.draggable .wk-heater { transition: transform .12s ease; }
  .wk-slot.draggable:active .wk-heater { transform: translateX(-50%) scale(1.06); }
  @keyframes wk-bob { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-2px); } }
  @keyframes wk-glow { 0%,100% { opacity: .45; transform: translate(-50%,-50%) scale(0.92); } 50% { opacity: .85; transform: translate(-50%,-50%) scale(1.08); } }

  /* primary / secondary button */
  .wk-btn {
    width: 100%; height: 70px; border-radius: 20px; border: 2px solid transparent; flex-shrink: 0;
    font-family: 'ZCOOL KuaiLe', 'PingFang SC', system-ui; font-size: 22px; letter-spacing: 0.03em; white-space: nowrap;
    display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
    transition: transform .12s ease, box-shadow .2s ease, background .3s ease;
    box-shadow: 0 8px 18px -6px color-mix(in srgb, var(--accent) 55%, transparent);
  }
  .wk-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 22px -6px color-mix(in srgb, var(--accent) 60%, transparent); }
  .wk-btn:active { transform: translateY(1px) scale(0.99); }
  .wk-pulse { width: 11px; height: 11px; border-radius: 50%; display: inline-block; animation: wk-heat 1s ease-in-out infinite; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="vendor/react.js"></script>
  <script src="vendor/react-dom.js"></script>

  <script src="app.js"></script>

</body>
</html>
